<!DOCTYPE html>
<html lang="en">

<head>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff7cab">

<link rel="apple-touch-icon"
href="icon-192.png">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
content="#f7e9f1">

<title>Derm Assist</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#f7e9f1;
}

/* MAIN PAGE */

.main{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* BACKGROUND IMAGE */

.bg{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transform:scale(1.1);
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(255,240,248,0.55),
rgba(245,230,255,0.65)
);
}

/* CONTENT */

.content{
position:relative;
z-index:2;
text-align:center;
padding:20px;
animation:fadeIn 1s ease;
}

/* LOGO */

.logo{
width:180px;
margin-bottom:25px;
animation:float 3s ease-in-out infinite;
filter:drop-shadow(
0 0 18px rgba(255,124,171,0.4)
);
}

/* TITLE */

.title{
font-size:38px;
font-weight:900;
color:#8a2f66;
margin-bottom:12px;
}

/* SUBTITLE */

.subtitle{
font-size:16px;
color:#5f4d58;
line-height:1.7;
max-width:320px;
margin:auto;
}

/* LOADING */

.loader{
margin-top:35px;
display:flex;
justify-content:center;
gap:10px;
}

.loader span{
width:10px;
height:10px;
border-radius:50%;
background:#d95b96;
animation:bounce 1.3s infinite;
}

.loader span:nth-child(2){
animation-delay:0.2s;
}

.loader span:nth-child(3){
animation-delay:0.4s;
}

/* COPYRIGHT */

.copyright{
position:absolute;
bottom:25px;
width:100%;
text-align:center;
font-size:13px;
color:#6d4b5e;
z-index:2;
font-weight:600;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

@keyframes bounce{
0%,80%,100%{
transform:scale(0.7);
opacity:0.5;
}
40%{
transform:scale(1.3);
opacity:1;
}
}

</style>

</head>

<body>

<div class="main">

<!-- BACKGROUND -->

<img
src="background.jpg"
class="bg">

<div class="overlay"></div>

<!-- CONTENT -->

<div class="content">

<img
src="logo.png"
class="logo">

<div class="title">
Derm Assist
</div>

<div class="subtitle">

AI Powered Skin Care Assistant<br>

Analyze your skin, track progress,
book dermatologists, and glow naturally.

</div>

<div class="loader">

<span></span>
<span></span>
<span></span>

</div>

</div>

<!-- COPYRIGHT -->

<div class="copyright">

© 2026 Derm Assist • Developed by Sree

</div>

</div>

<script>

/* AUTO REDIRECT TO SPLASH */

setTimeout(function(){

window.location.href =
"splash.html";

},3000);

</script>

</body>
</html>

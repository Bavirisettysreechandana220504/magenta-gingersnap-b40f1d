<!DOCTYPE html>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#f7e9f1}
.frame{max-width:650px;margin:auto;min-height:100vh;padding:18px 18px 90px;background:linear-gradient(#fff5fa,#f7e9f1)}

.card{background:white;border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 8px 18px #0001}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.product{background:#fff;border-radius:20px;padding:12px;box-shadow:0 5px 12px #0001}
.product img{width:100%;height:155px;object-fit:cover;border-radius:16px}
.name{font-weight:900;color:#333;margin-top:8px}
.price{font-size:22px;font-weight:900;color:#2c2335}
button{width:100%;border:none;border-radius:14px;padding:11px;margin-top:8px;background:linear-gradient(135deg,#ff7cab,#c894ff);color:white;font-weight:800}
.bottom{position:fixed;bottom:0;left:0;right:0;max-width:650px;margin:auto;background:white;display:flex;justify-content:space-around;padding:14px;border-radius:20px 20px 0 0}
.bottom div{text-align:center;font-size:12px;color:#777}
.bottom i{display:block;font-size:19px;color:#d95b96}
</style>
</head>

</div>
</div>

<div class="bottom">
<div><i class="fas fa-home"></i>Home</div>
<div onclick="location='scan.html'"><i class="fas fa-camera"></i>Scan</div>
<div onclick="location='cart.html'"><i class="fas fa-shopping-cart"></i>Cart</div>
<div onclick="location='profile.html'"><i class="fas fa-user"></i>Profile</div>
</div>

<script>const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:5000" : window.location.origin;
document.getElementById("userName").innerText =

const products={

]

let selectedProducts=products[concern] || products.default;

document.getElementById("products").innerHTML=selectedProducts.map((p,i)=>`
<div class="product">
<img src="${images[i%images.length]}">
<div class="name">${p[0]}</div>
<p>${p[2]}</p>
<div class="price">${p[1]}</div>
<button onclick="addToCart(${i})">Add to Cart</button>
<button onclick="buyNow(${i})">Buy Now</button>
</div>
`).join("");

function getCart(){
    return JSON.parse(localStorage.getItem("cart") || "[]");
}

function addToCart(i){
    let cart=getCart();
    const p=selectedProducts[i];
    cart.push({
        name:p[0],
        price:p[1],
        type:p[2],
        img:images[i%images.length],
        qty:1
    });
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Added to cart");
}

function buyNow(i){
    addToCart(i);
    location="cart.html";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile - Derm Assist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#f7e9f1}
.frame{max-width:560px;margin:0 auto;min-height:100vh;padding:18px 18px 90px;background:linear-gradient(#fff5fa,#f7e9f1)}
h2{text-align:center;color:#8a2f66}
.card{background:white;border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 8px 18px #0001}
.profile{display:flex;gap:14px;align-items:center}
.profile img{width:85px;height:85px;border-radius:50%;object-fit:cover}
.name{font-size:22px;color:#8a2f66;font-weight:900}
.scan-img{width:100%;border-radius:18px;margin-top:10px}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare img{width:100%;border-radius:14px}
.bar{height:12px;background:#ffe1ee;border-radius:20px;overflow:hidden;margin:7px 0 12px}
.fill{height:100%;background:linear-gradient(90deg,#ff7cab,#c894ff)}
.item{border-top:1px solid #f4d7e5;padding-top:12px;margin-top:12px}
.bottom{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:auto;background:white;display:flex;justify-content:space-around;padding:14px;border-radius:20px 20px 0 0}
.bottom div{text-align:center;font-size:12px;color:#777}
.bottom i{display:block;font-size:19px;color:#d95b96}
button{width:100%;border:none;border-radius:18px;padding:13px;background:linear-gradient(135deg,#ff7cab,#c894ff);color:white;font-weight:800}
</style>
</head>
<body>

<div class="frame">
<h2>My Profile</h2>

<div class="card" id="profileBox">Loading...</div>

<div class="card">
<h3 style="color:#8a2f66">Before / After Progress</h3>
<div class="compare" id="compareBox">Need at least 2 scans to compare.</div>
</div>

<div class="card">
<h3 style="color:#8a2f66">Progress Graph</h3>
<div id="graphBox">No scan data yet.</div>
</div>

<div class="card">
<h3 style="color:#8a2f66">Scan History</h3>
<div id="historyBox">Loading...</div>
</div>

<button onclick="logout()">Logout</button>
</div>

<div class="bottom">
<div onclick="location='home.html'"><i class="fas fa-home"></i>Home</div>
<div onclick="location='scan.html'"><i class="fas fa-camera"></i>Scan</div>
<div onclick="location='cart.html'"><i class="fas fa-shopping-cart"></i>Cart</div>
<div><i class="fas fa-user"></i>Profile</div>
</div>

<script>const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:5000" : window.location.origin;
const email=localStorage.getItem("userEmail");

if(!email){
    alert("Login first");
    location="login.html";
}

function percentNumber(value){
    return Number(String(value).replace("%","")) || 0;
}

async function loadProfile(){
    const res=await fetch(`${API_BASE}/profile?email=${email}`);
    const data=await res.json();

    if(data.status==="success"){
        const u=data.user;
        document.getElementById("profileBox").innerHTML=`
        <div class="profile">
            <img src="${u.image_url}">
            <div>
                <div class="name">${u.name}</div>
                <div>${u.email}</div>
                <div>Mobile: ${u.mobile}</div>
                <div>Skin Type: ${u.skin}</div>
            </div>
        </div>`;
    }
}

async function loadHistory(){
    const res=await fetch(`${API_BASE}/scan_history?email=${email}`);
    const data=await res.json();

    if(data.status!=="success")return;

    const list=data.history;

    if(list.length===0){
        document.getElementById("historyBox").innerText="No scans yet.";
        return;
    }

    document.getElementById("historyBox").innerHTML=list.map(item=>`
    <div class="item">
        <b>${item.concerns}</b><br>
        <small>${item.date}</small>
        <p>${item.result}</p>
        <p><b>Routine:</b> ${item.routine}</p>
        <p><b>Doctor Advice:</b> ${item.doctor_advice}</p>
        <img class="scan-img" src="${item.marked_image_url}">
    </div>`).join("");

    const latest=list[0];

    document.getElementById("graphBox").innerHTML=`
        <b>Hydration: ${latest.hydration}</b>
        <div class="bar"><div class="fill" style="width:${latest.hydration}"></div></div>

        <b>Oil Level: ${latest.oil_level}</b>
        <div class="bar"><div class="fill" style="width:${latest.oil_level}"></div></div>

        <b>Sensitivity: ${latest.sensitivity}</b>
        <div class="bar"><div class="fill" style="width:${latest.sensitivity}"></div></div>

        <b>Glow Score: ${latest.glow_score}</b>
        <div class="bar"><div class="fill" style="width:${latest.glow_score}"></div></div>

        <b>Acne Spots: ${latest.acne_count}</b><br>
        <b>Severity: ${latest.severity}</b>
    `;

    if(list.length>=2){
        const before=list[list.length-1];
        const after=list[0];
        const beforeAcne=Number(before.acne_count || 0);
        const afterAcne=Number(after.acne_count || 0);
        let improve=0;
        if(beforeAcne>0){
            improve=Math.max(0, Math.round(((beforeAcne-afterAcne)/beforeAcne)*100));
        }

        document.getElementById("compareBox").innerHTML=`
            <div>
                <b>Before</b>
                <img src="${before.marked_image_url}">
                <p>Acne Spots: ${before.acne_count}</p>
            </div>
            <div>
                <b>After</b>
                <img src="${after.marked_image_url}">
                <p>Acne Spots: ${after.acne_count}</p>
            </div>
            <div style="grid-column:1/3;text-align:center;color:#8a2f66;font-weight:900">
                Improvement: ${improve}%
            </div>
        `;
    }
}

function logout(){
    localStorage.clear();
    location="login.html";
}

loadProfile();
loadHistory();
</script>
</body>
</html>

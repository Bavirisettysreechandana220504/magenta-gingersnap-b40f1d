<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7e9f1">
<title>Derm Assist</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f7e9f1}
body{min-height:100dvh}
.mobile-frame{
    width:100vw;height:100dvh;position:relative;overflow:hidden;
    background:url("background.jpg") no-repeat center center/cover;
}
.mobile-frame::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(255,240,248,0.50), rgba(245,230,255,0.55));
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.content{
    position:relative;z-index:1;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    text-align:center;padding:max(28px, env(safe-area-inset-top)) 24px calc(150px + env(safe-area-inset-bottom)) 24px;
    animation:fadeIn .8s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{
    width:180px;max-width:60vw;margin-top:80px;
    filter:drop-shadow(0 0 16px rgba(214,102,171,.28));
    animation:logoFloat 2.8s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title{margin-top:18px;font-size:30px;font-weight:800;color:#24192d;line-height:1.15}
.desc{margin-top:12px;max-width:320px;font-size:14px;color:#6f6278;line-height:1.6}
.dots{margin-top:22px;display:flex;gap:8px;align-items:center;justify-content:center}
.dots span{width:8px;height:8px;border-radius:50%;background:#d36f9d;animation:bounce 1.2s infinite ease-in-out}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.45}40%{transform:scale(1.2);opacity:1}}
.button-row{
    position:absolute;left:20px;right:20px;bottom:calc(22px + env(safe-area-inset-bottom));
    z-index:2;display:flex;gap:12px;
}
button{
    flex:1;border:none;border-radius:20px;padding:16px 12px;min-height:56px;
    font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s ease, box-shadow .2s ease;
}
button:active{transform:scale(.97)}
.register-btn{background:rgba(255,255,255,.95);color:#5d4e68;box-shadow:0 8px 18px rgba(0,0,0,.08)}
.login-btn{background:linear-gradient(135deg,#ff7cab,#c894ff);color:#fff;box-shadow:0 10px 22px rgba(193,120,190,.28)}
</style>
</head>
<body>
<div class="mobile-frame">
    <div class="content">
        <img src="logo.png" alt="Derm Assist Logo" class="logo">
        <div class="title">Hey beautiful,<br>welcome!</div>
        <div class="desc">Your personalized skincare companion for glowing, confident skin.</div>
        <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div class="button-row">
        <button class="register-btn" onclick="window.location='register.html'">Register</button>
        <button class="login-btn" onclick="window.location='login.html'">Sign In</button>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f7e9f1;
    padding:30px;
}
.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="card">
    <h2>Skin Analysis Result</h2>
    <p id="result"></p>
</div>

<script>
document.getElementById("result").innerText =
    localStorage.getItem("result");
</script>

</body>
</html>

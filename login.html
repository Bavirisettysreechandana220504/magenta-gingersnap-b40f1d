<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="theme-color" content="#f7e9f1">

<title>Derm Assist Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#f7e9f1;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:url("background.jpg")
no-repeat center center/cover;
}

body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(255,240,248,0.45),
rgba(245,230,255,0.48)
);
backdrop-filter:blur(5px);
}

.container{
position:relative;
z-index:1;
width:100%;
padding:20px;
display:flex;
justify-content:center;
}

.card{
width:100%;
max-width:420px;

background:rgba(255,255,255,0.55);

border:1px solid rgba(255,255,255,0.4);

border-radius:28px;

padding:24px 20px;

backdrop-filter:blur(16px);

box-shadow:0 10px 30px rgba(0,0,0,0.08);

animation:fade 0.4s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
}

.logo img{
width:80px;
}

.heading{
text-align:center;
font-size:28px;
font-weight:800;
margin-top:10px;
color:#8a3e67;
}

.sub{
text-align:center;
font-size:13px;
color:#8f7885;
margin-top:8px;
margin-bottom:22px;
}

.input-box{
position:relative;
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:18px 46px;
border:none;
outline:none;
border-radius:18px;
background:white;
font-size:14px;
border:1px solid #f0cade;
transition:0.3s;

/* REMOVE BLUE HIGHLIGHT */
-webkit-appearance:none;
appearance:none;
caret-color:#c45b8f;
-webkit-tap-highlight-color:transparent;
}

.input-box input:focus{
border-color:#d95b96;
box-shadow:none;
outline:none;
}

/* REMOVE BLUE AUTOFILL */
.input-box input:-webkit-autofill,
.input-box input:-webkit-autofill:hover,
.input-box input:-webkit-autofill:focus{
-webkit-box-shadow:0 0 0px 1000px white inset !important;
-webkit-text-fill-color:#4b2d3b !important;
transition:background-color 5000s ease-in-out 0s;
}

.input-box label{
position:absolute;
left:46px;
top:17px;
font-size:14px;
color:#9b7082;
transition:0.25s;
pointer-events:none;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown)+label{
top:5px;
font-size:11px;
color:#c45b8f;
}

.left-icon{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#c45b8f;
}

.eye{
position:absolute;
right:16px;
top:50%;
transform:translateY(-50%);
color:#c45b8f;
cursor:pointer;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:-5px;
margin-bottom:12px;
font-size:13px;
color:#7c5b6a;
}

.remember{
display:flex;
align-items:center;
gap:6px;
}

.remember input{
accent-color:#d95b96;
}

.forgot{
cursor:pointer;
font-weight:600;
color:#c45b8f;
}

button{
width:100%;
border:none;
padding:15px;
border-radius:18px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:0.2s;
outline:none;
}

button:focus{
outline:none;
box-shadow:none;
}

button:active{
transform:scale(0.98);
}

.login-btn{
background:linear-gradient(
135deg,
#ff7eae,
#c792ff
);

color:white;

box-shadow:0 10px 22px
rgba(217,91,150,0.25);
}

.social{
margin-top:12px;
background:white;
border:1px solid #efbfd2;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
color:#5a3848;
}

.social img{
width:18px;
height:18px;
}

.divider{
display:flex;
align-items:center;
margin:18px 0;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#edcddd;
}

.divider span{
margin:0 10px;
font-size:12px;
font-weight:700;
color:#9b7082;
}

/* APK STYLE ERROR MESSAGE */

#msg{
display:none;
margin-top:12px;
padding:12px 14px;
border-radius:14px;
font-size:13px;
font-weight:600;
text-align:center;
background:#fff0f4;
border:1px solid #ffb7cd;
color:#d93b73;
animation:shake 0.25s ease;
}

#msg.show{
display:block;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-4px);}
50%{transform:translateX(4px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}
}

.bottom{
text-align:center;
margin-top:18px;
font-size:14px;
color:#7c5b6a;
}

.bottom a{
text-decoration:none;
font-weight:700;
color:#d95b96;
}

.toast{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(
135deg,
#ff8eb9,
#c997ff
);
color:white;
padding:14px 18px;
border-radius:18px;
font-size:14px;
font-weight:700;
opacity:0;
pointer-events:none;
transition:0.3s;
z-index:999;
}

.toast.show{
opacity:1;
}

.loading{
opacity:0.7;
pointer-events:none;
}

</style>

</head>

<body autocomplete="off">

<div class="toast" id="toast"></div>

<div class="container">

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<div class="heading">
Welcome Back!
</div>

<div class="sub">
Login to continue your skincare journey✨
</div>

<div class="input-box">

<i class="fas fa-envelope left-icon"></i>

<input
id="email"
type="email"
placeholder=" "
autocomplete="off"
maxlength="60"
>

<label>Email</label>

</div>

<div class="input-box">

<i class="fas fa-lock left-icon"></i>

<input
id="password"
type="password"
placeholder=" "
maxlength="30"
autocomplete="new-password"
>

<label>Password</label>

<i class="fas fa-eye eye"
onclick="togglePassword()"></i>

</div>

<div class="row">

<label class="remember">

<input type="checkbox" id="remember">

<span>Remember Me</span>

</label>

<div class="forgot"
onclick="forgotPassword()">
Forgot Password?
</div>

</div>

<button
class="login-btn"
id="loginBtn"
onclick="login()">
Login
</button>

<div id="msg"></div>

<div class="divider">
<span>OR</span>
</div>

<button
class="social"
onclick="googleLogin()">

<img
src="https://developers.google.com/identity/images/g-logo.png">

Google

</button>

<button
class="social"
onclick="guestLogin()">

<i class="fas fa-user-secret"></i>

Continue as Guest

</button>

<div class="bottom">
Don’t have an account?
<a href="register.html">Sign Up</a>
</div>

</div>

</div>

<script>

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
    apiKey: "AIzaSyDz7K2UUPJuZy_x6UN8Gfkae_HUyw5zrkA",
    authDomain: "derm-assist-df5c7.firebaseapp.com",
    projectId: "derm-assist-df5c7",
    storageBucket: "derm-assist-df5c7.firebasestorage.app",
    messagingSenderId: "581788899919",
    appId: "1:581788899919:web:02cbc2f78e83cb91d9a83a",
    measurementId: "G-RS8E8WQ6Y9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

/* =========================
   TOAST
========================= */

function showToast(message){

const toast = document.getElementById("toast");

toast.innerText = message;

toast.classList.add("show");

setTimeout(() => {

toast.classList.remove("show");

},2000);

}

/* =========================
   SHOW ERROR LIKE APK
========================= */

function showError(message){

const msg =
document.getElementById("msg");

msg.innerText = message;

msg.classList.add("show");

setTimeout(()=>{

msg.classList.remove("show");

},3000);

}

/* =========================
   PASSWORD TOGGLE
========================= */

function togglePassword(){

const password =
document.getElementById("password");

const eye =
document.querySelector(".eye");

if(password.type === "password"){

password.type = "text";

eye.classList.replace(
"fa-eye",
"fa-eye-slash"
);

}

else{

password.type = "password";

eye.classList.replace(
"fa-eye-slash",
"fa-eye"
);

}

}

/* =========================
   EMAIL VALIDATION
========================= */

function validEmail(email){

return /^(?!.*\.\.)(?!.*\.$)(?!^\.)[A-Za-z0-9._%+-]+@[A-Za-z0-9-]+\.[A-Za-z]{2,}$/
.test(email);

}

/* =========================
   LOGIN
========================= */

function login(){

const email =
document.getElementById("email")
.value.trim();

const password =
document.getElementById("password")
.value.trim();

const btn =
document.getElementById("loginBtn");

if(email === "" || password === ""){

showError(
"Please fill all fields"
);

return;

}

if(!validEmail(email)){

showError(
"Please enter valid email"
);

return;

}

if(password.length < 6){

showError(
"Password must be at least 6 characters"
);

return;

}

btn.innerText = "Logging in...";

btn.classList.add("loading");

auth.signInWithEmailAndPassword(
email,
password
)

.then((userCredential)=>{

const user = userCredential.user;

/* GET NAME FROM REGISTER */

const registeredName =
localStorage.getItem(
`registered_${email}`
);

/* SAVE USER DETAILS */

localStorage.setItem(
"user",
user.email
);

localStorage.setItem(
"userEmail",
user.email
);

localStorage.setItem(
"userName",
registeredName
);

localStorage.removeItem(
"guestUser"
);

showToast(
"✨ Login Successful"
);

setTimeout(()=>{

window.location =
"home.html";

},1200);

})


.catch((error)=>{

let customMessage =
"Login failed";

if(
error.code ===
"auth/invalid-credential"
){

customMessage =
"Invalid email or password";

}

else if(
error.code ===
"auth/user-not-found"
){

customMessage =
"Account not found";

}

else if(
error.code ===
"auth/wrong-password"
){

customMessage =
"Incorrect password";

}

else if(
error.code ===
"auth/invalid-email"
){

customMessage =
"Invalid email format";

}

showError(customMessage);

})

.finally(()=>{

btn.innerText = "Login";

btn.classList.remove("loading");

});

}

/* =========================
   GOOGLE LOGIN
========================= */

function googleLogin(){

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider)

.then((result)=>{

const user = result.user;

localStorage.setItem(
"userName",
user.displayName
);

localStorage.removeItem(
"guestUser"
);

localStorage.setItem(
"user",
user.email
);

localStorage.setItem(
"userName",
user.displayName || "User"
);

localStorage.removeItem(
"guestUser"
);

showToast(
"✅ Google Login Success"
);

setTimeout(()=>{

window.location =
"home.html";

},1200);

})

.catch(()=>{

showError(
"Google login failed"
);

});

}

/* =========================
   GUEST LOGIN
========================= */

function guestLogin(){

const btns =
document.querySelectorAll(".social");

btns.forEach(btn=>{
btn.disabled = true;
});

showToast(
"✨ Entering Guest Mode..."
);

localStorage.setItem(
"guestUser",
"true"
);

localStorage.setItem(
"userName",
"Guest User"
);

localStorage.setItem(
"loginType",
"guest"
);

setTimeout(()=>{

window.location =
"home.html";

},1500);

}

/* =========================
   FORGOT PASSWORD
========================= */

function forgotPassword(){

const email =
document.getElementById("email")
.value.trim();

if(email === ""){

showError(
"Enter your email first"
);

return;

}

if(!validEmail(email)){

showError(
"Enter valid email"
);

return;

}

auth.sendPasswordResetEmail(email)

.then(()=>{

showToast(
"📩 Password reset email sent"
);

})

.catch(()=>{

showError(
"Unable to send reset email"
);

});

}

/* =========================
   AUTO LOGIN
========================= */

window.onload = ()=>{

localStorage.removeItem("user");

document.getElementById("email").value = "";

document.getElementById("password").value = "";

};

/* =========================
   LIVE EMAIL VALIDATION
========================= */

document.getElementById("email")
.addEventListener("input",function(){

this.value =
this.value.replace(/\s/g,'');

});

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Order Success</title>

<style>

body{

margin:0;
font-family:Arial;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

background:
linear-gradient(
135deg,
#ffe7f2,
#f5e8ff
);

}

.card{

background:white;

padding:40px 30px;

border-radius:28px;

text-align:center;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);

width:90%;
max-width:400px;

}

.icon{

font-size:70px;
margin-bottom:20px;

}

h1{

color:#8a2f66;

}

p{

color:#666;
line-height:1.7;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:18px;

background:
linear-gradient(
135deg,
#ff7cab,
#c894ff
);

color:white;

font-size:16px;
font-weight:900;

cursor:pointer;

margin-top:20px;

}

</style>
</head>

<body>

<div class="card">

<div class="icon">
🎉
</div>

<h1>
Order Placed
</h1>

<p>

Your skincare products
will be delivered soon.

</p>

<button
onclick="location.href='home.html'">

Back To Home

</button>

</div>

</body>
</html>
